<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="title">Rizwan Go Rides</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f7fb;
}

/* HEADER */

header{
background:linear-gradient(90deg,#ff7a18,#ffb347);
color:white;
padding:20px;
text-align:center;
}

header h1{
margin:0;
font-size:32px;
}

/* LANGUAGE */

.language{
position:absolute;
top:20px;
right:20px;
}

select{
padding:6px;
border-radius:5px;
}

/* HERO */

.hero{
padding:40px;
text-align:center;
background:white;
}

.hero h2{
color:#333;
}

.hero p{
color:#555;
}

/* BOOKING BOX */

.booking{
max-width:500px;
margin:30px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.booking input,
.booking select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
}

.booking button{
width:100%;
padding:12px;
background:#ff7a18;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.booking button:hover{
background:#ff5e00;
}

/* WAIT SCREEN */

#waitScreen{
display:none;
text-align:center;
padding:40px;
}

footer{
text-align:center;
padding:15px;
margin-top:40px;
background:#222;
color:white;
}

</style>
</head>

<body>

<header>

<div class="language">
<select id="languageSelect" onchange="changeLanguage()">
<option value="en">English</option>
<option value="hi">हिंदी</option>
</select>
</div>

<h1>Rizwan Go Rides</h1>

</header>

<section class="hero">

<h2 id="welcome">Safe • Reliable • Comfortable Rides</h2>

<p id="tagline">
Airport pickup, local rides and outstation travel with trusted drivers.
</p>

</section>

<section class="booking">

<h2 id="bookride">Book Your Ride</h2>

<input type="text" id="name" placeholder="Your Name">

<input type="text" id="pickup" placeholder="Pickup Location">

<input type="text" id="drop" placeholder="Drop Location">

<input type="date" id="date">

<input type="time" id="time">

<button onclick="sendBooking()" id="bookbtn">
Send Booking Request
</button>

</section>

<div id="waitScreen">

<h2 id="waitmsg">
Please wait… driver response on the way.
</h2>

<p id="waitmsg2">
You will now be redirected to WhatsApp to confirm your ride.
</p>

</div>

<footer>

<p>Rizwan Go Rides • Safe Travel Partner</p>

</footer>

<script>

function sendBooking(){

var name=document.getElementById("name").value;
var pickup=document.getElementById("pickup").value;
var drop=document.getElementById("drop").value;
var date=document.getElementById("date").value;
var time=document.getElementById("time").value;

var message=
"New Ride Booking:%0A"+
"Name: "+name+"%0A"+
"Pickup: "+pickup+"%0A"+
"Drop: "+drop+"%0A"+
"Date: "+date+"%0A"+
"Time: "+time;

document.querySelector(".booking").style.display="none";
document.getElementById("waitScreen").style.display="block";

setTimeout(function(){

window.location.href=
"https://wa.me/918826618273?text="+message;

},3000);

}

/* LANGUAGE SWITCH */

function changeLanguage(){

var lang=document.getElementById("languageSelect").value;

if(lang==="hi"){

document.getElementById("welcome").innerText="सुरक्षित • भरोसेमंद • आरामदायक यात्रा";

document.getElementById("tagline").innerText=
"एयरपोर्ट पिकअप, लोकल राइड और आउटस्टेशन यात्रा।";

document.getElementById("bookride").innerText="अपनी राइड बुक करें";

document.getElementById("bookbtn").innerText="बुकिंग भेजें";

document.getElementById("waitmsg").innerText=
"कृपया प्रतीक्षा करें… ड्राइवर का जवाब आ रहा है।";

document.getElementById("waitmsg2").innerText=
"आपको व्हाट्सऐप पर भेजा जाएगा।";

}

if(lang==="en"){

document.getElementById("welcome").innerText="Safe • Reliable • Comfortable Rides";

document.getElementById("tagline").innerText=
"Airport pickup, local rides and outstation travel.";

document.getElementById("bookride").innerText="Book Your Ride";

document.getElementById("bookbtn").innerText="Send Booking Request";

document.getElementById("waitmsg").innerText=
"Please wait… driver response on the way.";

document.getElementById("waitmsg2").innerText=
"You will now be redirected to WhatsApp.";

}

}

</script>

</body>
</html>
